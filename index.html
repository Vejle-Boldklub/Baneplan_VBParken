<!doctype html>
<html lang="da"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Baneplan VB Parken</title><style>
:root{
  --vb-red:#e30613;
  --vb-dark:#101010;
  --line:#d9dde4;
  --soft-line:#edf0f4;
  --time-w:118px;
  --field-w:188px;
  --row-h:32px;
  --header-h:62px;
}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,Arial,Helvetica,sans-serif;background:#f4f5f7;color:#111}
.page{max-width:1540px;margin:0 auto;padding:16px}
.card{background:#fff;border:1px solid #e6e9ee;border-radius:14px;box-shadow:0 10px 28px rgba(0,0,0,.08);overflow:hidden}
.top{display:grid;grid-template-columns:minmax(280px,1fr) auto;align-items:center;gap:22px;padding:26px 34px 22px 30px;border-bottom:1px solid #eceff3;background:linear-gradient(180deg,#ffffff 0%,#fbfcfe 100%);position:relative}
.brand{position:relative;text-transform:uppercase;display:flex;flex-direction:column;gap:11px;padding:4px 0 4px 19px;font-family:Montserrat,'Avenir Next','Segoe UI',Inter,Arial,sans-serif}
.brand:before{content:"";position:absolute;left:0;top:2px;bottom:2px;width:5px;border-radius:999px;background:var(--vb-red)}
.brand h1{margin:0;font-size:27px;line-height:1;font-weight:850;letter-spacing:.035em;white-space:nowrap;color:#080808}
.brand .park{display:none}
.brand .season{margin:0 0 0;display:inline-block;width:max-content;padding:0;color:#4f5967;font-size:13px;line-height:1;font-weight:760;letter-spacing:.09em}
.day-heading{display:none}
.day-heading:before,.day-heading:after{display:none}
.logo{height:82px;max-width:125px;object-fit:contain;grid-column:2;justify-self:end;align-self:center;display:block;padding-bottom:3px}
.tabs{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid #d9dde4;background:#fafafa}
.tab{height:44px;border:0;border-right:1px solid #d9dde4;background:#f7f8fa;font-weight:620;color:#596170;text-transform:uppercase;cursor:pointer;font-size:13px;letter-spacing:.02em}
.tab:last-child{border-right:0}.tab.active{background:var(--vb-red);color:#fff;font-weight:700}
.scroller{overflow-x:auto;padding:14px 14px 18px}
.schedule{position:relative;min-width:calc(var(--time-w) + 7 * var(--field-w));display:grid;grid-template-columns:var(--time-w) repeat(7,var(--field-w));grid-template-rows:var(--header-h) auto;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#fff}
.corner{grid-column:1;grid-row:1;background:var(--vb-red);border-right:1px solid #fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:22px;letter-spacing:.03em;position:sticky;left:0;z-index:4}.corner:before{content:"TID"}
.field-head{height:var(--header-h);border-bottom:1px solid var(--line);border-right:1px solid #323232;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;text-align:center;background:#151515;color:#fff;z-index:2;text-transform:uppercase;padding-top:11px}
.field-head .name{font-weight:760;font-size:21px;line-height:1;letter-spacing:.015em}.field-head .type{font-size:12px;font-weight:650;line-height:1;color:#fff;text-transform:none;opacity:.95;margin-top:4px}.field-head .type.empty{visibility:hidden}
.time-col{grid-column:1;grid-row:2;position:sticky;left:0;background:#fff;border-right:1px solid var(--line);z-index:3}
.time-label{position:absolute;left:0;right:0;text-align:center;transform:translateY(-50%);font-size:11.5px;color:#111;font-weight:610;line-height:1;display:flex;align-items:center;justify-content:center;white-space:nowrap;padding:0 4px;height:16px}.time-label.hour{color:var(--vb-red);font-weight:780}
.lane{grid-row:2;position:relative;border-right:1px solid var(--line);background:#fff}.lane:last-child{border-right:0}.lane::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(to bottom,transparent 0,transparent calc(var(--row-h) - 1px),var(--soft-line) calc(var(--row-h) - 1px),var(--soft-line) var(--row-h));pointer-events:none}.hour-line{position:absolute;left:0;right:0;height:1px;background:rgba(92,102,116,.28);pointer-events:none;z-index:1}
.event{position:absolute;border-radius:7px;border:2px solid rgba(0,0,0,.20);box-shadow:0 4px 8px rgba(17,24,39,.05);overflow:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:7px 6px;min-height:26px;cursor:pointer;transition:transform .12s ease, box-shadow .12s ease;z-index:5}.event:hover{transform:translateY(-1px);box-shadow:0 10px 22px rgba(0,0,0,.20);z-index:20}.event .team{font-weight:640;font-size:13px;line-height:1.16;letter-spacing:-.01em}.event .room{font-size:11.5px;line-height:1.2;margin-top:11px;font-weight:560;opacity:.92}.event.small{padding:4px 4px}.event.small .team{font-size:13px}.event.small .room{font-size:11.5px;margin-top:8px}
.cat-piger{background:#d4ebcb;border-color:#5ca35a;color:#101a10}.cat-drenge{background:#ffe4a3;border-color:#e4a500;color:#241b00}.cat-future{background:#d8ecff;border-color:#5aa7e8;color:#0d2438}.cat-akademi{background:#d8e9ff;border-color:#6aa2dc;color:#10263c}.cat-andet{background:#e7ddff;border-color:#8b70d9;color:#25164b}.cat-reserveret{background:repeating-linear-gradient(135deg,#f1f2f4 0,#f1f2f4 8px,#e2e5e9 8px,#e2e5e9 16px);border-color:#6b7280;color:#111827}
.tooltip{position:fixed;display:none;z-index:9999;min-width:190px;background:#fff;color:#111;border-radius:8px;padding:12px 13px;box-shadow:0 12px 28px rgba(0,0,0,.22);font-size:13px;pointer-events:none;border:1px solid #e5e7eb}.tooltip .t-title{font-weight:760;margin-bottom:8px;font-size:14px}.tooltip .row{margin-top:4px;font-weight:650;color:#111}.hidden{display:none!important}
@media(max-width:1350px){:root{--time-w:104px;--field-w:170px;--row-h:31px}.page{padding:0;background:#fff}.card{border-radius:0;border:0;box-shadow:none}.top{display:grid;grid-template-columns:1fr 82px;grid-template-rows:auto;align-items:start;gap:8px 12px;padding:16px 16px 14px;border-bottom:1px solid #eceff3}.brand{grid-column:1;grid-row:1;padding-left:15px;gap:9px}.brand h1{font-size:21px;letter-spacing:.025em;white-space:normal;line-height:1.08}.brand .season{font-size:11px;letter-spacing:.07em}.day-heading{display:none}.day-heading:before,.day-heading:after{display:none}.logo{grid-column:2;grid-row:1;justify-self:end;align-self:start;height:62px;max-width:78px;padding-bottom:0}.tabs{grid-template-columns:repeat(7,minmax(92px,1fr));overflow-x:auto;scrollbar-width:thin}.tab{height:42px;font-size:12px}.scroller{padding:10px 8px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch}.schedule{min-width:calc(var(--time-w) + 7 * var(--field-w))}.field-head{padding-top:10px}.field-head .name{font-size:17px}.field-head .type{font-size:11px;margin-top:5px}.event .team{font-size:12px}.event .room{font-size:10.5px;margin-top:8px}.time-label{font-size:10.5px}}
@media(max-width:640px){:root{--time-w:96px;--field-w:154px;--row-h:30px}.top{padding:14px 12px 12px}.brand h1{font-size:18px}.brand .season{font-size:10px}.logo{height:54px;max-width:68px}.tab{min-width:86px;font-size:11px}.field-head .name{font-size:16px}.event .team{font-size:11.5px}.event .room{font-size:10px}}

@media(max-height:520px) and (orientation:landscape){
  .top{grid-template-columns:1fr 74px;grid-template-rows:auto;padding:12px 14px 10px;gap:6px 10px}
  .brand h1{font-size:20px;line-height:1.05}.brand .season{font-size:10.5px}
  .day-heading{display:none}.day-heading:before,.day-heading:after{display:none}
  .logo{grid-column:2;grid-row:1;height:58px;max-width:72px}
  .tabs{position:sticky;top:0;z-index:30}.scroller{padding-top:8px}
}

const DAYS = DATA.days;
const FIELDS = DATA.fields;
const weekdayMap = ['Søndag','Mandag','Tirsdag','Onsdag','Torsdag','Fredag','Lørdag'];
let activeDay = pickInitialDay();
function pxPerMin(){return parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--row-h'))/15;}
function pickInitialDay(){const d=weekdayMap[new Date().getDay()];return DAYS.includes(d)?d:'Mandag'}
function rangeForDay(day){return (day==='Lørdag'||day==='Søndag')?{min:9*60,max:14*60}:{min:14*60+30,max:21*60}}
function overlaps(a,b){return a.start<b.end&&b.start<a.end}
function layoutEvents(events){
  const sorted=[...events].sort((a,b)=>a.start-b.start||a.end-b.end);
  const clusters=[];
  for(const ev of sorted){let hit=null;for(const c of clusters){if(c.events.some(x=>overlaps(x,ev))){hit=c;break}} if(hit){hit.events.push(ev);hit.start=Math.min(hit.start,ev.start);hit.end=Math.max(hit.end,ev.end)}else clusters.push({start:ev.start,end:ev.end,events:[ev]})}
  let changed=true;while(changed){changed=false;outer:for(let i=0;i<clusters.length;i++){for(let j=i+1;j<clusters.length;j++){if(clusters[i].events.some(a=>clusters[j].events.some(b=>overlaps(a,b)))){clusters[i].events.push(...clusters[j].events);clusters[i].start=Math.min(clusters[i].start,clusters[j].start);clusters[i].end=Math.max(clusters[i].end,clusters[j].end);clusters.splice(j,1);changed=true;break outer}}}}
  const out=[];for(const c of clusters){const cols=[];c.events.sort((a,b)=>a.start-b.start||a.end-b.end).forEach(ev=>{let col=0;while(cols[col]&&cols[col].some(x=>overlaps(x,ev)))col++;(cols[col] ||= []).push(ev);ev._col=col});const n=cols.length;c.events.forEach(ev=>out.push({...ev,col:ev._col,cols:n}))}return out
}
function h(tag,cls,text){const e=document.createElement(tag);if(cls)e.className=cls;if(text!==undefined)e.textContent=text;return e}
function renderTabs(){const tabs=document.getElementById('tabs');tabs.innerHTML='';DAYS.forEach(day=>{const b=h('button','tab'+(day===activeDay?' active':''),day);b.onclick=()=>{activeDay=day;render()};tabs.appendChild(b)})}
function render(){
  renderTabs();
  const mm=rangeForDay(activeDay), ppm=pxPerMin(), bodyH=(mm.max-mm.min)*ppm;
  const sched=document.getElementById('schedule');sched.innerHTML='';sched.style.gridTemplateRows=`var(--header-h) ${bodyH}px`;
  sched.appendChild(h('div','corner'));
  FIELDS.forEach((f,i)=>{const head=h('div','field-head');head.style.gridColumn=i+2;head.innerHTML=`<div class="name">${escapeHtml(f.name)}</div><div class="type ${f.type?'':'empty'}">${f.type?'('+escapeHtml(f.type)+')':'-'}</div>`;sched.appendChild(head)});
  const timeCol=h('div','time-col');timeCol.style.height=bodyH+'px';
  for(let t=mm.min;t<=mm.max;t+=15){const lab=h('div','time-label'+(t%60===0?' hour':''),formatTime(t));lab.style.top=((t-mm.min)*ppm)+'px';timeCol.appendChild(lab)}
  sched.appendChild(timeCol);
  FIELDS.forEach((f,i)=>{const lane=h('div','lane');lane.style.gridColumn=i+2;lane.style.height=bodyH+'px';for(let t=mm.min;t<=mm.max;t+=15){if(t%60===0){const line=h('div','hour-line');line.style.top=((t-mm.min)*ppm)+'px';lane.appendChild(line)}}const evs=DATA.events.filter(e=>e.day===activeDay&&e.field===f.name&&e.end>mm.min&&e.start<mm.max);const laid=layoutEvents(evs);laid.forEach(ev=>{const el=h('div',`event cat-${ev.category}`);const top=(Math.max(ev.start,mm.min)-mm.min)*ppm;const height=Math.max((Math.min(ev.end,mm.max)-Math.max(ev.start,mm.min))*ppm-6,24);const gap=5;const width=100/ev.cols;const left=ev.col*width;el.style.top=top+3+'px';el.style.height=height+'px';el.style.left=`calc(${left}% + ${gap}px)`;el.style.width=`calc(${width}% - ${gap*2}px)`;if(height<60||width<60)el.classList.add('small');el.innerHTML=`<div class="team">${escapeHtml(ev.team)}</div>${hasRoom(ev.room)?`<div class="room">Omkl. ${escapeHtml(ev.room)}</div>`:''}`;el.dataset.tip=JSON.stringify(ev);el.addEventListener('mouseenter',showTip);el.addEventListener('mousemove',moveTip);el.addEventListener('mouseleave',hideTip);lane.appendChild(el)});sched.appendChild(lane)})
}
function formatTime(m){return String(Math.floor(m/60)).padStart(2,'0')+'.'+String(m%60).padStart(2,'0')}
function escapeHtml(s){return String(s).replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function hasRoom(room){const r=String(room??'').trim();return r!==''&&r!=='-'&&r.toLowerCase()!=='nan'}
function showTip(e){const ev=JSON.parse(e.currentTarget.dataset.tip),tip=document.getElementById('tooltip');tip.innerHTML=`<div class="t-title">${escapeHtml(ev.team)}</div><div class="row">${ev.startText} - ${ev.endText}</div><div class="row">${escapeHtml(ev.field)}</div>${hasRoom(ev.room)?`<div class="row">Omkl. ${escapeHtml(ev.room)}</div>`:''}`;tip.style.display='block';moveTip(e)}
function moveTip(e){const tip=document.getElementById('tooltip');tip.style.left=Math.min(e.clientX+14,window.innerWidth-230)+'px';tip.style.top=Math.min(e.clientY+14,window.innerHeight-130)+'px'}
function hideTip(){document.getElementById('tooltip').style.display='none'}
